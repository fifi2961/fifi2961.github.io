<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Escape Game — Mot Secret</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#080c10;
  --panel:#0d1520;
  --border:#1e3a5f;
  --glow:#00c8ff;
  --glow2:#ff4444;
  --glow3:#00ff88;
  --text:#a8cfe0;
  --dim:#3a5a70;
  --digit-bg:#060e18;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono', monospace;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.panel{
  width:min(520px,94vw);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:6px;
  padding:46px;
}

.title{
  text-align:center;
  font-size:24px;
  margin-bottom:10px;
  font-family:'Cinzel', serif;
}

.subtitle{
  text-align:center;
  font-size:11px;
  color:var(--dim);
  margin-bottom:30px;
}

.word-row{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.letter{
  width:50px;
  height:60px;
  background:var(--digit-bg);
  border:1px solid var(--border);
  color:var(--glow);
  text-align:center;
  font-size:26px;
  text-transform:uppercase;
  outline:none;
}

.letter:focus{
  border-color:var(--glow);
  box-shadow:0 0 10px rgba(0,200,255,0.3);
}

.btn{
  width:100%;
  padding:15px;
  border:1px solid var(--glow);
  background:transparent;
  color:var(--glow);
  cursor:pointer;
  margin-top:10px;
}

.feedback{
  min-height:50px;
  text-align:center;
  margin:15px 0;
  opacity:0;
}

.feedback.show{opacity:1;}
.feedback.error{color:var(--glow2);}
.feedback.success{color:var(--glow3);}

.success-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,10,6,0.95);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
}

.success-overlay.active{
  opacity:1;
  pointer-events:all;
}

.success-title{
  font-size:50px;
  color:var(--glow3);
  font-family:'Cinzel', serif;
}

.success-sub{
  margin-top:10px;
  font-size:14px;
  text-align:center;
  color:var(--glow3);
}

</style>
</head>

<body>

<div class="panel">

  <div class="title">DÉVERROUILLAGE</div>
  <div class="subtitle">TROUVE LE MOT SECRET</div>

  <div class="word-row" id="wordRow"></div>

  <div class="feedback" id="feedback"></div>

  <button class="btn" onclick="verify()">VÉRIFIER</button>

</div>

<div class="success-overlay" id="success">
  <div class="success-title">BRAVO !</div>
  <div class="success-sub">Rendez-vous à la cantine...</div>
</div>

<script>

const SECRET = "CURIEUX";
const MAX = 3;

let attempts = 0;
let locked = false;

const row = document.getElementById("wordRow");

// création des cases
for(let i=0;i<SECRET.length;i++){
  const input = document.createElement("input");
  input.className = "letter";
  input.maxLength = 1;
  input.addEventListener("input", () => {
    input.value = input.value.toUpperCase().replace(/[^A-Z]/g,'');
    if(input.value && i < SECRET.length-1){
      row.children[i+1].focus();
    }
  });
  row.appendChild(input);
}

const inputs = () => [...document.querySelectorAll(".letter")];

function getWord(){
  return inputs().map(i => i.value).join("");
}

function show(msg, type){
  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + type;
  fb.textContent = msg;
}

function verify(){

  if(locked) return;

  const word = getWord();

  if(word.length < SECRET.length){
    show("Mot incomplet", "error");
    return;
  }

  if(word === SECRET){
    locked = true;
    document.getElementById("success").classList.add("active");
    return;
  }

  attempts++;

  const left = MAX - attempts;

  if(left <= 0){
    locked = true;
    inputs().forEach(i => i.disabled = true);
    show("PERDU : plus de tentatives", "error");
    return;
  }

  show("Incorrect — essais restants : " + left, "error");
}

</script>

</body>
</html>
